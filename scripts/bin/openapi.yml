openapi: 3.0.0
info:
  title: Tanzaku API
  version: 1.1.0
  description: tanzakuアプリケーションの実装準拠API仕様
  contact:
    name: Fuminori Ogawa
    email: fuminori@mizphses.com

tags:
  - name: tanzaku
    description: tanzakuの投稿・取得に関するエンドポイント
  - name: accounts
    description: アカウント管理・認証に関するエンドポイント
  - name: manage
    description: 管理画面向けエンドポイント

servers:
  - url: https://tanzakuv2.fuminori.workers.dev
    description: 本番環境
  - url: http://localhost:8787
    description: ローカル環境

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    BasicAuth:
      type: http
      scheme: basic

  schemas:
    Tanzaku:
      type: object
      required:
        - id
        - content
        - userName
        - visiblePattern
        - validationResult
        - logicalDelete
        - createdAt
      properties:
        id:
          type: string
        content:
          type: string
        userName:
          type: string
        visiblePattern:
          type: boolean
        validationResult:
          type: integer
          enum: [0, 1]
        logicalDelete:
          type: boolean
        createdAt:
          type: string
          format: date-time
        eventId:
          type: string
          nullable: true

    TanzakuWithEvent:
      allOf:
        - $ref: "#/components/schemas/Tanzaku"
        - type: object
          properties:
            event:
              allOf:
                - $ref: "#/components/schemas/EventSummary"
              nullable: true

    CreateTanzakuRequest:
      type: object
      required:
        - content
        - userName
      properties:
        content:
          type: string
          maxLength: 14
          description: 14文字以内のメッセージ
        userName:
          type: string

    AuthTokens:
      type: object
      required:
        - accessToken
        - refreshToken
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string

    SignupRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    RefreshTokenRequest:
      type: object
      required:
        - refreshToken
      properties:
        refreshToken:
          type: string

    Error:
      type: object
      required:
        - error
      properties:
        error:
          type: string

    SuccessResponse:
      type: object
      required:
        - success
      properties:
        success:
          type: boolean

    SuccessWithIdResponse:
      type: object
      required:
        - success
        - id
      properties:
        success:
          type: boolean
        id:
          type: string

    EventSummary:
      type: object
      required:
        - id
        - name
      properties:
        id:
          type: string
        name:
          type: string

    Event:
      type: object
      required:
        - id
        - name
        - isActive
        - createdAt
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
          nullable: true
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time

    EventWithCount:
      allOf:
        - $ref: "#/components/schemas/Event"
        - type: object
          required:
            - _count
          properties:
            _count:
              type: object
              required:
                - tanzakus
              properties:
                tanzakus:
                  type: integer

    CreateEventRequest:
      type: object
      required:
        - name
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string

    ManageCreateTanzakuRequest:
      allOf:
        - $ref: "#/components/schemas/CreateTanzakuRequest"
        - type: object
          properties:
            validationResult:
              type: integer
              enum: [0, 1]
            eventId:
              type: string
              nullable: true

    ManageTanzakuDeleteOperation:
      type: object
      required:
        - id
        - operation
      properties:
        id:
          type: string
        operation:
          type: string
          enum: [delete]

    ManageTanzakuUpdateOperation:
      type: object
      required:
        - id
        - operation
      properties:
        id:
          type: string
        operation:
          type: string
          enum: [update]
        content:
          type: string
        userName:
          type: string
        validationResult:
          type: integer
          enum: [0, 1]
        eventId:
          type: string
          nullable: true

paths:
  /tanzaku:
    get:
      tags:
        - tanzaku
      operationId: getTanzakuList
      summary: tanzaku一覧を取得
      description: すべてのtanzakuを新しい順で取得します
      responses:
        "200":
          description: tanzaku一覧
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TanzakuWithEvent"

    post:
      tags:
        - tanzaku
      operationId: createTanzaku
      summary: 新しいtanzakuを作成
      description: 新しいtanzakuを作成します。通常投稿ではAIによるバリデーションが実行されます。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTanzakuRequest"
      responses:
        "200":
          description: 作成されたtanzaku
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tanzaku"

  /tanzaku/check/{id}:
    get:
      tags:
        - tanzaku
      operationId: getTanzakuById
      summary: 特定のtanzakuを取得
      description: 指定されたIDのtanzakuを取得します
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: tanzakuの詳細
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tanzaku"
        "404":
          description: tanzakuが見つかりません
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /tanzaku/client:
    get:
      tags:
        - tanzaku
      operationId: getClientTanzaku
      summary: クライアント表示用tanzakuを取得
      description: |
        クライアント表示用のtanzakuを取得します。
        `limit` 未指定時は10件、最大30件です。
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 30
            default: 10
      responses:
        "200":
          description: tanzaku一覧
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Tanzaku"

  /auth/google:
    get:
      tags:
        - accounts
      operationId: authWithGoogle
      summary: Google OAuth認証
      description: Google OAuth認証を行い、成功時はフロントエンドへトークン付きでリダイレクトします
      responses:
        "302":
          description: 認証成功後にフロントエンドへリダイレクト
        "500":
          description: エラー
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /auth/signup:
    post:
      tags:
        - accounts
      operationId: signup
      summary: 新規ユーザー登録
      description: 新しい管理ユーザーを登録します
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignupRequest"
      responses:
        "200":
          description: 認証トークン
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthTokens"
        "500":
          description: エラー
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /auth/login:
    post:
      tags:
        - accounts
      operationId: login
      summary: ログイン
      description: 既存ユーザーとしてログインします
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignupRequest"
      responses:
        "200":
          description: 認証トークン
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthTokens"
        "500":
          description: エラー
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /auth/refresh:
    post:
      tags:
        - accounts
      operationId: refreshToken
      summary: トークンのリフレッシュ
      description: アクセストークンをリフレッシュします
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshTokenRequest"
      responses:
        "200":
          description: 新しい認証トークン
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthTokens"
        "401":
          description: 無効なリフレッシュトークン
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /manage:
    get:
      tags:
        - manage
      operationId: getManagePage
      summary: 管理画面HTMLを取得
      description: Basic認証付きの管理画面HTMLを返します
      security:
        - BasicAuth: []
      responses:
        "200":
          description: 管理画面HTML
          content:
            text/html:
              schema:
                type: string
        "401":
          description: 認証失敗

  /manage/tanzakus:
    get:
      tags:
        - manage
      operationId: manageGetAllTanzaku
      summary: 管理用tanzaku一覧を取得
      description: 管理画面向けに全tanzakuを取得します
      security:
        - BasicAuth: []
      responses:
        "200":
          description: 全tanzaku一覧
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TanzakuWithEvent"
        "500":
          description: エラー
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    post:
      tags:
        - manage
      operationId: manageEditTanzaku
      summary: 管理用tanzakuの編集・削除
      description: 管理画面向けにtanzakuを更新または論理削除します
      security:
        - BasicAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                oneOf:
                  - $ref: "#/components/schemas/ManageTanzakuDeleteOperation"
                  - $ref: "#/components/schemas/ManageTanzakuUpdateOperation"
      responses:
        "200":
          description: 編集成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "500":
          description: エラー
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /manage/tanzakus/create:
    post:
      tags:
        - manage
      operationId: manageCreateTanzaku
      summary: 管理用tanzaku作成
      description: 管理画面からAIバリデーションなしでtanzakuを作成します
      security:
        - BasicAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ManageCreateTanzakuRequest"
      responses:
        "200":
          description: 作成成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessWithIdResponse"
        "500":
          description: エラー
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /manage/events:
    get:
      tags:
        - manage
      operationId: manageGetEvents
      summary: イベント一覧を取得
      description: 管理画面向けにイベント一覧を取得します
      security:
        - BasicAuth: []
      responses:
        "200":
          description: イベント一覧
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/EventWithCount"
        "500":
          description: エラー
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    post:
      tags:
        - manage
      operationId: manageCreateEvent
      summary: イベントを作成
      description: 管理画面からイベントを作成します
      security:
        - BasicAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEventRequest"
      responses:
        "200":
          description: 作成成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessWithIdResponse"
        "500":
          description: エラー
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /manage/events/deactivate-all:
    post:
      tags:
        - manage
      operationId: manageDeactivateAllEvents
      summary: 全イベントを非アクティブ化
      description: すべてのイベントの `isActive` を `false` にします
      security:
        - BasicAuth: []
      responses:
        "200":
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "500":
          description: エラー
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /manage/events/{id}/activate:
    post:
      tags:
        - manage
      operationId: manageActivateEvent
      summary: イベントをアクティブ化
      description: 指定イベントのみをアクティブ化します
      security:
        - BasicAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "500":
          description: エラー
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
