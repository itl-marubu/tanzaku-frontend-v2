openapi: 3.0.0
info:
  title: Tanzaku API
  version: 2.0.0
  description: tanzakuアプリケーションのAPI仕様(この定義が正本。フロントエンドの型生成はここから行う)
  contact:
    name: Fuminori Ogawa
    email: fuminori@mizphses.com

tags:
  - name: tanzaku
    description: tanzakuの操作に関するエンドポイント
  - name: config
    description: グローバル設定に関するエンドポイント
  - name: manage
    description: 管理者用エンドポイント(Basic認証)

servers:
  - url: https://tanzakuv2.fuminori.workers.dev
    description: 本番環境
  - url: http://localhost:8787
    description: ローカル環境

components:
  securitySchemes:
    BasicAuth:
      type: http
      scheme: basic
      description: 管理画面用(ADMIN_ID / ADMIN_PWD)

  schemas:
    Tanzaku:
      type: object
      required:
        - id
        - content
        - userName
        - validationResult
        - logicalDelete
        - createdAt
      properties:
        id:
          type: string
        content:
          type: string
        userName:
          type: string
        validationResult:
          type: number
          enum: [0, 1]
          description: 0=適切(表示)、1=不適切(非表示)
        logicalDelete:
          type: boolean
        createdAt:
          type: string
          format: date-time
        eventId:
          type: string
          nullable: true
          description: 紐付くイベント。null はレガシー(イベント制導入前)データ

    TanzakuWithEvent:
      allOf:
        - $ref: "#/components/schemas/Tanzaku"
        - type: object
          properties:
            event:
              type: object
              nullable: true
              required:
                - id
                - name
              properties:
                id:
                  type: string
                name:
                  type: string

    Event:
      type: object
      required:
        - id
        - name
        - isActive
        - createdAt
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
          nullable: true
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time

    EventWithCount:
      allOf:
        - $ref: "#/components/schemas/Event"
        - type: object
          required:
            - _count
          properties:
            _count:
              type: object
              required:
                - tanzakus
              properties:
                tanzakus:
                  type: number

    Config:
      type: object
      required:
        - festivalMode
      properties:
        festivalMode:
          type: string
          description: 現在のフェスティバルモード。未設定時のデフォルトは "tanabata"

    TanzakuEditOperation:
      oneOf:
        - type: object
          required:
            - id
            - operation
          properties:
            id:
              type: string
            operation:
              type: string
              enum: [delete]
        - type: object
          required:
            - id
            - operation
          properties:
            id:
              type: string
            operation:
              type: string
              enum: [hardDelete]
        - type: object
          required:
            - id
            - operation
          properties:
            id:
              type: string
            operation:
              type: string
              enum: [update]
            content:
              type: string
              maxLength: 14
            userName:
              type: string
            validationResult:
              type: number
              enum: [0, 1]
            eventId:
              type: string
              nullable: true
              description: 未指定=変更しない、null=レガシーへ移動

    Success:
      type: object
      required:
        - success
      properties:
        success:
          type: boolean

    SuccessWithId:
      type: object
      required:
        - success
        - id
      properties:
        success:
          type: boolean
        id:
          type: string

    Error:
      type: object
      properties:
        error:
          type: string

paths:
  /tanzaku:
    get:
      tags:
        - tanzaku
      operationId: getTanzakuList
      summary: tanzaku一覧を取得
      description: 全てのtanzakuの一覧を取得します(createdAt降順、event付き)
      responses:
        "200":
          description: tanzaku一覧
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TanzakuWithEvent"

    post:
      tags:
        - tanzaku
      operationId: createTanzaku
      summary: 新しいtanzakuを作成
      description: 新しいtanzakuを作成します(AIによる適切性検証付き)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - content
                - userName
              properties:
                content:
                  type: string
                  maxLength: 14
                  description: 14文字以内のメッセージ
                userName:
                  type: string
      responses:
        "200":
          description: 作成されたtanzaku(validationResult=1 は AI により非表示判定)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tanzaku"
        "400":
          description: バリデーションエラー

  /tanzaku/check/{id}:
    get:
      tags:
        - tanzaku
      operationId: getTanzakuById
      summary: 特定のtanzakuを取得
      description: 指定されたIDのtanzakuの詳細を取得します
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: tanzakuの詳細
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tanzaku"
        "404":
          description: tanzakuが見つかりません
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /tanzaku/client:
    get:
      tags:
        - tanzaku
      operationId: getRecentTanzaku
      summary: クライアント表示用のtanzakuを取得
      description: |
        アクティブイベント(なければレガシー)スコープの表示可能なtanzakuを
        limit件返す、DB書き込みを一切行わないステートレスなローテーションです。

        - 新着セグメント: 直近60秒以内に作成された短冊を新しい順に最大 limit-2 件。
          window/seed に依存しないため、リロード連打でも新着は必ず先頭に表示されます。
        - 巡回セグメント: 残り枠を、新着以外の表示可能な短冊の安定順序上の窓
          (window と seed から決定的に算出するオフセット)で充填します。
          末尾に達すると先頭へラップします。
        - window/seed を省略するとサーバーの壁時計から window を導出します
          (カーソル未対応のクライアント向けデフォルト挙動)。

        同一の limit/window/seed を指定した呼び出しは(データ変化がない限り)
        常に同一の結果を返します。
      parameters:
        - name: limit
          in: query
          required: false
          description: 取得件数。数値化できない値や未指定は10として扱います(1〜30にclamp)。
          schema:
            type: integer
            minimum: 1
            maximum: 30
            default: 10
        - name: window
          in: query
          required: false
          description: >-
            巡回セグメントの窓インデックス。呼び出し毎にインクリメントすることで
            バッチが入れ替わります。省略・不正値はサーバー壁時計から導出します。
          schema:
            type: integer
            minimum: 0
            maximum: 4294967295
        - name: seed
          in: query
          required: false
          description: >-
            クライアント固有の乱数シード(最大64文字)。変更すると巡回セグメントの
            位相がずれ、別バッチが表示されます。省略・不正値は空文字列相当。
          schema:
            type: string
            maxLength: 64
      responses:
        "200":
          description: tanzaku一覧
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Tanzaku"

  /config:
    get:
      tags:
        - config
      operationId: getConfig
      summary: グローバル設定を取得
      description: 認証不要でフェスティバルモードなどのグローバル設定を取得します
      responses:
        "200":
          description: 現在の設定
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Config"

  /manage/session:
    get:
      tags:
        - manage
      operationId: manageSession
      summary: 管理者資格情報の疎通確認
      description: Basic認証を通過できるかの確認用。フロントの管理画面ログインが使用します
      security:
        - BasicAuth: []
      responses:
        "200":
          description: 認証成功
          content:
            application/json:
              schema:
                type: object
                required:
                  - ok
                properties:
                  ok:
                    type: boolean
        "401":
          description: 認証失敗

  /manage/tanzakus:
    get:
      tags:
        - manage
      operationId: manageGetAllTanzaku
      summary: 管理者用:全tanzakuの取得
      description: 全てのtanzakuを取得します(createdAt降順、event付き)
      security:
        - BasicAuth: []
      responses:
        "200":
          description: 全tanzaku一覧
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TanzakuWithEvent"
        "500":
          description: エラー
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    post:
      tags:
        - manage
      operationId: manageEditTanzaku
      summary: 管理者用:tanzakuの一括編集
      description: 論理削除(delete)・完全削除(hardDelete)・更新(update)を一括適用します
      security:
        - BasicAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: "#/components/schemas/TanzakuEditOperation"
      responses:
        "200":
          description: 編集成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Success"
        "500":
          description: エラー
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /manage/tanzakus/create:
    post:
      tags:
        - manage
      operationId: manageCreateTanzaku
      summary: 管理者用:tanzakuの作成
      description: AI検証をスキップしてtanzakuを作成します
      security:
        - BasicAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - content
                - userName
              properties:
                content:
                  type: string
                  maxLength: 14
                userName:
                  type: string
                validationResult:
                  type: number
                  enum: [0, 1]
                  description: 未指定は0(適切)
                eventId:
                  type: string
                  nullable: true
                  description: 未指定=アクティブイベント、null=レガシー
      responses:
        "200":
          description: 作成成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessWithId"
        "500":
          description: エラー
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /manage/events:
    get:
      tags:
        - manage
      operationId: manageGetEvents
      summary: 管理者用:イベント一覧
      description: 全イベントを短冊数付きで取得します(createdAt降順)
      security:
        - BasicAuth: []
      responses:
        "200":
          description: イベント一覧
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/EventWithCount"
        "500":
          description: エラー
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    post:
      tags:
        - manage
      operationId: manageCreateEvent
      summary: 管理者用:イベント作成
      security:
        - BasicAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
              properties:
                name:
                  type: string
                description:
                  type: string
      responses:
        "200":
          description: 作成成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessWithId"
        "500":
          description: エラー
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /manage/events/deactivate-all:
    post:
      tags:
        - manage
      operationId: manageDeactivateAllEvents
      summary: 管理者用:全イベントを無効化
      security:
        - BasicAuth: []
      responses:
        "200":
          description: 無効化成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Success"
        "500":
          description: エラー
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /manage/config:
    put:
      tags:
        - manage
      operationId: manageUpdateConfig
      summary: 管理者用:フェスティバルモードの更新
      description: グローバル設定(festivalMode)を実行時に切り替えます
      security:
        - BasicAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - festivalMode
              properties:
                festivalMode:
                  type: string
                  minLength: 1
                  maxLength: 32
      responses:
        "200":
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Success"
        "400":
          description: バリデーションエラー
        "500":
          description: エラー
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /manage/events/{id}/activate:
    post:
      tags:
        - manage
      operationId: manageActivateEvent
      summary: 管理者用:イベントを有効化(排他的)
      description: 指定イベントのみを有効化し、他は全て無効化します
      security:
        - BasicAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: 有効化成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Success"
        "500":
          description: エラー
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
